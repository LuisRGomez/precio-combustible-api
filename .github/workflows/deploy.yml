name: Deploy a Tankear

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Copiar archivos backend al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          source: "main_do.py,telegram_bot.py,nocturno_notify.py,noticias_bot.py,validador.py,promo_detector.py,scraper_do.py,update_prices.py,db_sqlite.py,db.py,geo.py,auth.py"
          target: /var/www/tankear/api
          strip_components: 0

      - name: Build frontend y reiniciar servicios
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e

            echo "=== Frontend: build y deploy ==="
            cd /var/www/tankear/frontend-src
            git pull origin master
            cd front-end
            npm run build
            cp -r dist/* /var/www/tankear/frontend/
            nginx -s reload

            echo "=== Reiniciando servicios backend ==="
            systemctl restart tankear-api
            systemctl restart tankear-bot

            echo "✅ Deploy completo"
