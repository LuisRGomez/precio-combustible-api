name: Deploy Tankear

on:
  push:
    branches: [master]

jobs:
  # ─── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front-end/package-lock.json

      - name: Install dependencies
        working-directory: front-end
        run: npm ci

      - name: Build
        working-directory: front-end
        env:
          VITE_API_BASE: ''
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist/
          retention-days: 1

  # ─── Deploy al servidor ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: front-end/dist/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            front-end/dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/tankear/frontend/
          echo "✅ Frontend deployed"

      - name: Deploy backend (si main_do.py cambió)
        run: |
          # Detectar si el backend cambió en este push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E "^(main_do\.py|db_sqlite\.py|geo\.py|scraper_do\.py|precio_ciencia\.py)" || true)

          if [ -n "$CHANGED" ]; then
            echo "📦 Backend cambió, desplegando: $CHANGED"

            # Copiar archivos al servidor
            for file in $CHANGED; do
              if [ -f "$file" ]; then
                scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                  "$file" \
                  ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/var/www/tankear/api/

                # main_do.py va también como main.py (el que usa el servicio)
                if [ "$file" = "main_do.py" ]; then
                  ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
                    ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
                    "cp /var/www/tankear/api/main_do.py /var/www/tankear/api/main.py"
                fi
              fi
            done

            # Reiniciar el servicio
            ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "systemctl restart tankear && sleep 2 && systemctl is-active tankear"
            echo "✅ Backend reiniciado"
          else
            echo "⏭️  Backend sin cambios, no se reinicia el servicio"
          fi

      - name: Health check
        run: |
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://tankear.com.ar/)
          if [ "$STATUS" = "200" ]; then
            echo "✅ tankear.com.ar responde 200 OK"
          else
            echo "❌ tankear.com.ar devolvió HTTP $STATUS"
            exit 1
          fi
