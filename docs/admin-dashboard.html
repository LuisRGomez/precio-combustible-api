        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #F59E0B;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            color: #F59E0B;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header p {
            color: #9ca3af;
            font-size: 14px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* FILTROS */
        .filters {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            color: #d1d5db;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group input {
            background: #111827;
            border: 1px solid #374151;
            border-radius: 4px;
            padding: 8px 12px;
            color: #e5e7eb;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .filter-group input:focus {
            outline: none;
            border-color: #F59E0B;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .btn-apply {
            background: #F59E0B;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            margin-left: auto;
        }

        .btn-apply:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
        }

        /* KPI CARDS */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(17, 24, 39, 0.8) 100%);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 8px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, transparent);
        }

        .kpi-label {
            color: #9ca3af;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #F59E0B;
            margin-bottom: 8px;
        }

        .kpi-delta {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .delta-positive {
            color: #10b981;
        }

        .delta-negative {
            color: #ef4444;
        }

        .delta-neutral {
            color: #6b7280;
        }

        /* CHARTS GRID */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1200px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(17, 24, 39, 0.8) 100%);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 8px;
            padding: 25px;
            position: relative;
        }

        .chart-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, transparent);
        }

        .chart-title {
            color: #e5e7eb;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #F59E0B;
            border-radius: 2px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* TABLA */
        .table-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(17, 24, 39, 0.8) 100%);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 8px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }

        .table-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, transparent);
        }

        .table-title {
            color: #e5e7eb;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #F59E0B;
            border-radius: 2px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            border-bottom: 2px solid rgba(245, 158, 11, 0.2);
        }

        th {
            text-align: left;
            padding: 12px;
            color: #F59E0B;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(245, 158, 11, 0.1);
            color: #d1d5db;
            font-size: 13px;
        }

        tr:hover {
            background: rgba(245, 158, 11, 0.05);
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-email {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }

        .badge-whatsapp {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge-page {
            background: rgba(245, 158, 11, 0.15);
            color: #fbbf24;
            font-size: 12px;
        }

        /* RANKING */
        .ranking-card {
            background: linear-gradient(135deg, rgba(31, 41, 55, 0.6) 0%, rgba(17, 24, 39, 0.8) 100%);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 8px;
            padding: 25px;
            position: relative;
        }

        .ranking-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, transparent);
        }

        .ranking-title {
            color: #e5e7eb;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ranking-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #F59E0B;
            border-radius: 2px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(245, 158, 11, 0.1);
        }

        .ranking-item:last-child {
            border-bottom: none;
        }

        .ranking-position {
            font-weight: 700;
            color: #F59E0B;
            font-size: 18px;
            min-width: 30px;
        }

        .ranking-name {
            flex: 1;
            margin-left: 15px;
            color: #e5e7eb;
        }

        .ranking-count {
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
        }

        .ranking-bar {
            position: relative;
            height: 4px;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 2px;
            margin-top: 8px;
            width: 100%;
        }

        .ranking-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #F59E0B, #d97706);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .last-updated {
            text-align: center;
            color: #6b7280;
            font-size: 12px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(245, 158, 11, 0.1);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .spinner {
            border: 3px solid rgba(245, 158, 11, 0.1);
            border-top: 3px solid #F59E0B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        <div class="last-updated" id="lastUpdated"></div>

        };

        let allLeads = JSON.parse(JSON.stringify(sampleData.leads));
        let filteredLeads = JSON.parse(JSON.stringify(sampleData.leads));
        let charts = {};

        // INICIALIZAR
        document.addEventListener('DOMContentLoaded', function() {
            loadDashboard();
        });

        function loadDashboard() {
            updateKPIs();
            updateCharts();
            updateTable();
            updateRankings();
            updateTimestamp();
        }

        function applyFilters() {
            const dateFrom = new Date(document.getElementById('dateFrom').value);
            const dateTo = new Date(document.getElementById('dateTo').value);
            dateTo.setHours(23, 59, 59, 999);

            filteredLeads = allLeads.filter(lead => {
                const leadDate = new Date(lead.created_at);
                return leadDate >= dateFrom && leadDate <= dateTo;
            });

            loadDashboard();
        }

        function updateKPIs() {
            // Total de leads
            const totalLeads = filteredLeads.length;
            const emailLeads = filteredLeads.filter(l => l.tipo === 'email').length;
            const whatsappLeads = filteredLeads.filter(l => l.tipo === 'whatsapp').length;
            const quoterClicks = filteredLeads.filter(l => l.pagina_origen === 'cotizador_seguros').length;

            // Calcular deltas (hoy vs ayer)
            const hoy = new Date('2026-04-05');
            const ayer = new Date('2026-04-04');
            hoy.setHours(0, 0, 0, 0);
            ayer.setHours(0, 0, 0, 0);
            hoy.setHours(23, 59, 59, 999);

            const leadsHoy = filteredLeads.filter(l => {
                const d = new Date(l.created_at);
                d.setHours(0, 0, 0, 0);
                return d.getTime() === hoy.getTime();
            }).length;

            const leadsAyer = filteredLeads.filter(l => {
                const d = new Date(l.created_at);
                d.setHours(0, 0, 0, 0);
                return d.getTime() === ayer.getTime();
            }).length;

            const deltaPct = leadsAyer > 0 ? (((leadsHoy - leadsAyer) / leadsAyer) * 100).toFixed(1) : 0;

            // Actualizar KPI Cards
            document.getElementById('totalLeads').textContent = totalLeads;
            document.getElementById('totalLeadsDelta').innerHTML = getDeltaHTML(deltaPct, 'vs ayer');

            document.getElementById('emailLeads').textContent = emailLeads;
            const emailDelta = emailLeads > whatsappLeads ? '+18%' : '-12%';
            document.getElementById('emailDelta').innerHTML = getDeltaHTML(emailDelta, 'del total');

            document.getElementById('whatsappLeads').textContent = whatsappLeads;
            const whatsappDelta = whatsappLeads > emailLeads ? '+25%' : '+8%';
            document.getElementById('whatsappDelta').innerHTML = getDeltaHTML(whatsappDelta, 'del total');

            document.getElementById('quoterClicks').textContent = quoterClicks;
            document.getElementById('quoterDelta').innerHTML = getDeltaHTML('+32%', 'vs semana anterior');
        }

        function getDeltaHTML(value, label) {
            const numValue = parseFloat(value);
            const isPositive = numValue >= 0;
            const className = isPositive ? 'delta-positive' : 'delta-negative';
            return `<span class="${className}">${isPositive ? '↑' : '↓'} ${Math.abs(value)}</span> <span style="color: #6b7280;">${label}</span>`;
        }

        function updateCharts() {
            updateOriginChart();
            updateTrendsChart();
        }

        function updateOriginChart() {
            const originData = {};
            const pageLabels = {
                'combustible': 'Combustible',
                'cotizador_seguros': 'Cotizador Seguros',
                'road_trip': 'Road Trip',
                'noticias': 'Noticias',
                'dolar': 'Dólar',
                'garage': 'Garage'
            };

            filteredLeads.forEach(lead => {
                const origin = lead.pagina_origen;
                originData[origin] = (originData[origin] || 0) + 1;
            });

            const ctx = document.getElementById('originChart').getContext('2d');
            if (charts.originChart) charts.originChart.destroy();

            charts.originChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(originData).map(k => pageLabels[k] || k),
                    datasets: [{
                        label: 'Cantidad de Leads',
                        data: Object.values(originData),
                        backgroundColor: '#F59E0B',
                        borderColor: '#D97706',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#9ca3af' },
                            grid: { color: 'rgba(245, 158, 11, 0.1)' },
                            border: { color: 'rgba(245, 158, 11, 0.2)' }
                        },
                        x: {
                            ticks: { color: '#9ca3af' },
                            grid: { display: false },
                            border: { color: 'rgba(245, 158, 11, 0.2)' }
                        }
                    }
                }
            });
        }

        function updateTrendsChart() {
            // Obtener últimos 30 días
            const today = new Date('2026-04-05');
            const trendsData = {};

            for (let i = 29; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                trendsData[dateStr] = 0;
            }

            filteredLeads.forEach(lead => {
                const dateStr = lead.created_at.split('T')[0];
                if (trendsData.hasOwnProperty(dateStr)) {
                    trendsData[dateStr]++;
                }
            });

            const ctx = document.getElementById('trendsChart').getContext('2d');
            if (charts.trendsChart) charts.trendsChart.destroy();

            charts.trendsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Object.keys(trendsData),
                    datasets: [{
                        label: 'Leads por Día',
                        data: Object.values(trendsData),
                        borderColor: '#F59E0B',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#F59E0B',
                        pointBorderColor: '#D97706',
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#9ca3af' },
                            grid: { color: 'rgba(245, 158, 11, 0.1)' },
                            border: { color: 'rgba(245, 158, 11, 0.2)' }
                        },
                        x: {
                            ticks: { color: '#9ca3af' },
                            grid: { display: false },
                            border: { color: 'rgba(245, 158, 11, 0.2)' }
                        }
                    }
                }
            });
        }

        function updateTable() {
            const tableBody = document.getElementById('leadsTable');
            tableBody.innerHTML = '';

            const sortedLeads = [...filteredLeads].sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
            ).slice(0, 20);

            sortedLeads.forEach(lead => {
                const date = new Date(lead.created_at);
                const timeStr = date.toLocaleString('es-AR', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                const contact = lead.mail || lead.celular || 'N/A';
                const typeBadge = lead.tipo === 'email'
                    ? `<span class="badge badge-email">Email</span>`
                    : `<span class="badge badge-whatsapp">WhatsApp</span>`;

                const pageLabels = {
                    'combustible': 'Combustible',
                    'cotizador_seguros': 'Cotizador',
                    'road_trip': 'Road Trip',
                    'noticias': 'Noticias',
                    'dolar': 'Dólar',
                    'garage': 'Garage'
                };

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${timeStr}</td>
                    <td><small>${contact.substring(0, 20)}...</small></td>
                    <td>${typeBadge}</td>
                    <td>${lead.zona}</td>
                    <td><span class="badge badge-page">${pageLabels[lead.pagina_origen]}</span></td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateRankings() {
            const provincias = {};
            filteredLeads.forEach(lead => {
                provincias[lead.zona] = (provincias[lead.zona] || 0) + 1;
            });

            const sorted = Object.entries(provincias)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            const maxCount = sorted[0] ? sorted[0][1] : 1;

            const rankingHtml = sorted.map((item, index) => {
                const percentage = (item[1] / maxCount) * 100;
                return `
                    <div class="ranking-item">
                        <span class="ranking-position">${index + 1}</span>
                        <div style="flex: 1;">
                            <div class="ranking-name">${item[0]}</div>
                            <div class="ranking-bar">
                                <div class="ranking-bar-fill" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                        <div class="ranking-count">${item[1]} leads</div>
                    </div>
                `;
            }).join('');

            document.getElementById('topProvinces').innerHTML = rankingHtml;
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleString('es-AR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('lastUpdated').textContent = `Última actualización: ${timeStr}`;
        }
    </script>
