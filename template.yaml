AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: >
  API Precios Combustible Argentina — FastAPI on Lambda + DynamoDB + EventBridge

Globals:
  Function:
    Runtime: python3.11
    Layers:
      - !Ref DepsLayer
    Environment:
      Variables:
        DB_BACKEND: dynamo
        DYNAMODB_TABLE_SESSIONS: !Ref SessionsTable
        DYNAMODB_TABLE_LOCALIDADES: !Ref LocalidadesTable
        DYNAMODB_TABLE_HISTORICO: !Ref HistoricoTable

Parameters:
  Stage:
    Type: String
    Default: prod

Resources:

  # ── Lambda Layer ──────────────────────────────────────────────────────────

  DepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub combustible-deps-${Stage}
      Description: requests pandas numpy fastapi mangum boto3 uvicorn
      ContentUri: .layer-build/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete

  # ── DynamoDB ──────────────────────────────────────────────────────────────

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: combustible-sessions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: ip
          AttributeType: S
      KeySchema:
        - AttributeName: ip
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LocalidadesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: combustible-localidades
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: provincia
          AttributeType: S
        - AttributeName: localidad
          AttributeType: S
      KeySchema:
        - AttributeName: provincia
          KeyType: HASH
        - AttributeName: localidad
          KeyType: RANGE

  HistoricoTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: combustible-historico
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: fecha
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: fecha
          KeyType: RANGE

  # ── API Lambda ────────────────────────────────────────────────────────────

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub combustible-api-${Stage}
      CodeUri: src/
      Handler: lambda_handler.handler
      MemorySize: 512
      Timeout: 30
      Description: FastAPI via Mangum — Precios Combustible Argentina
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LocalidadesTable
        - DynamoDBReadPolicy:
            TableName: !Ref HistoricoTable
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: GET
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: GET

  # ── Scraper Lambda ────────────────────────────────────────────────────────

  ScraperFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub combustible-scraper-${Stage}
      CodeUri: src/
      Handler: scraper.handler
      MemorySize: 256
      Timeout: 300
      Description: Scraper diario — datos.energia.gob.ar → DynamoDB
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LocalidadesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref HistoricoTable
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)   # 06:00 UTC = 03:00 ART
            Name: !Sub combustible-daily-${Stage}
            Enabled: true

  # ── API Gateway HTTP API ──────────────────────────────────────────────────

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: "$default"
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
        AllowHeaders:
          - "*"
      DefaultRouteSettings:
        ThrottlingBurstLimit: 200
        ThrottlingRateLimit: 100

Outputs:
  ApiUrl:
    Description: URL del endpoint de la API
    Value: !Sub "https://${HttpApi}.execute-api.sa-east-1.amazonaws.com"
    Export:
      Name: combustible-api-url

  ApiFunction:
    Value: !GetAtt ApiFunction.Arn

  ScraperFunction:
    Value: !GetAtt ScraperFunction.Arn
